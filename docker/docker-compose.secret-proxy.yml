# bore secret proxy (`bore proxy`) — host network.
#
#   docker compose -f docker-compose.secret-proxy.yml up -d
#
# Connects to a named secret tunnel and exposes it on a local port. Host
# networking binds that port directly on the host (reachable by other machines).

services:
  bore-secret-proxy:
    image: ${BORE_IMAGE:-yourusername/bore:latest}
    # build:
    #   context: ..
    #   dockerfile: Dockerfile
    container_name: bore-secret-proxy
    command: ["proxy"]
    restart: unless-stopped
    network_mode: host
    environment:
      - BORE_SERVER=bore.tld              # --to; may be http(s)://bore.tld[:port]
      - BORE_LOCAL_PROXY_PORT=:5555       # local listen address (":5555" = all interfaces)
      - BORE_TCP_SECRET_ID=my-service     # must match the provider's tcp-secret-id
      - BORE_SECRET=change-me
      - BORE_AUTO_RECONNECT=true
      # Prefer a direct UDP hole-punched path to the provider (falls back to the
      # relay if it can't be established). The server must run with BORE_UDP=true
      # and the provider with BORE_PREFER_UDP=true.
      - BORE_PREFER_UDP=true
      # STUN server for UDP candidate discovery; defaults to the bore server's
      # control endpoint. Override only if the server is not also the STUN server:
      # - BORE_STUN_SERVER=stun.l.google.com:19302
      # Bind the UDP hole-punch socket to a fixed port (0=random). Open it for
      # egress in a strict firewall, same value on both peers, for the direct path:
      # - BORE_NAT_UDP_PORT=41641
      # Accept a self-signed server certificate for an https:// control address:
      # - BORE_INSECURE=true

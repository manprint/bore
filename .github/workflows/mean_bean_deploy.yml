on:
  push:
    branches:
      - "**" # every branch
    tags:
      - "v*" # version tags, e.g. v1.0.0
  workflow_dispatch:

name: Mean Bean Deploy
env:
  BIN: bore

# Every push (any branch) and every vX.Y.Z tag produces a GitHub Release named
# after the ref ("<branch>-<sha7>" for branches, the tag for tags), with all
# target binaries attached as release assets: compressed archives (.tar.gz/.zip)
# AND raw unstripped binaries (.exe on Windows). Every release is marked "latest"
# so https://github.com/manprint/bore/releases/latest/download/ always resolves
# to the most recent build. Branch builds are marked as pre-releases.

permissions:
  contents: write # create the release + tag and upload assets

jobs:
  # Create (or update) the release first, so the matrix build jobs only upload
  # assets to it and never race on creating it.
  create-release:
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.ver.outputs.name }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup | Version
        id: ver
        run: bash ci/version.bash
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.name }}
          prerelease: ${{ steps.ver.outputs.is_tag != 'true' }}
          make_latest: "true"
          draft: false

  # Downloads and stores `cross` as an artifact for reuse across the build jobs.
  install-cross:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - uses: XAMPPRocky/get-github-release@v1
        id: cross
        with:
          owner: rust-embedded
          repo: cross
          matches: ${{ matrix.platform }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: cross-${{ matrix.platform }}
          path: ${{ steps.cross.outputs.install_path }}
    strategy:
      matrix:
        platform: [linux-musl]

  macos:
    runs-on: macos-latest
    needs: create-release
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@v4

      - name: Setup | Version
        id: ver
        shell: bash
        run: bash ci/version.bash

      - name: Setup | Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ matrix.target }}

      - name: Setup | Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build | Build
        run: cargo build --all-features --release --target ${{ matrix.target }}

      - name: Package | Compressed archive
        run: tar -czvf "${{ env.BIN }}-${{ steps.ver.outputs.name }}-${{ matrix.target }}.tar.gz" --directory=target/${{ matrix.target }}/release ${{ env.BIN }}

      - name: Package | Raw binary
        run: cp "target/${{ matrix.target }}/release/${{ env.BIN }}" "${{ env.BIN }}-${{ steps.ver.outputs.name }}-${{ matrix.target }}"

      - name: Upload | Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: |
            ${{ env.BIN }}-${{ steps.ver.outputs.name }}-${{ matrix.target }}.tar.gz
            ${{ env.BIN }}-${{ steps.ver.outputs.name }}-${{ matrix.target }}

  linux:
    runs-on: ubuntu-latest
    needs: [install-cross, create-release]
    strategy:
      matrix:
        target:
          - aarch64-unknown-linux-musl
          - arm-unknown-linux-musleabi
          - arm-unknown-linux-gnueabi
          - armv7-unknown-linux-gnueabihf
          - armv7-unknown-linux-musleabihf
          - i686-unknown-linux-musl
          - x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Setup | Version
        id: ver
        run: bash ci/version.bash

      - uses: actions/download-artifact@v4
        with:
          name: cross-linux-musl
          path: /tmp/
      - run: chmod +x /tmp/cross

      - run: ci/set_rust_version.bash stable ${{ matrix.target }}
      - run: ci/build.bash /tmp/cross ${{ matrix.target }} RELEASE
      - name: Package | Compressed archive
        run: tar -czvf "${{ env.BIN }}-${{ steps.ver.outputs.name }}-${{ matrix.target }}.tar.gz" --directory=target/${{ matrix.target }}/release ${{ env.BIN }}

      - name: Package | Raw binary
        run: cp "target/${{ matrix.target }}/release/${{ env.BIN }}" "${{ env.BIN }}-${{ steps.ver.outputs.name }}-${{ matrix.target }}"

      - name: Upload | Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: |
            ${{ env.BIN }}-${{ steps.ver.outputs.name }}-${{ matrix.target }}.tar.gz
            ${{ env.BIN }}-${{ steps.ver.outputs.name }}-${{ matrix.target }}

  windows:
    runs-on: windows-latest
    needs: [install-cross, create-release]
    strategy:
      matrix:
        target:
          - i686-pc-windows-msvc
          - x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Setup | Version
        id: ver
        shell: bash
        run: bash ci/version.bash

      - run: bash ci/set_rust_version.bash stable ${{ matrix.target }}
      - run: bash ci/build.bash cargo ${{ matrix.target }} RELEASE
      - name: Package | Compressed archive
        shell: bash
        run: |
          cd ./target/${{ matrix.target }}/release/
          7z a "${{ env.BIN }}-${{ steps.ver.outputs.name }}-${{ matrix.target }}.zip" "${{ env.BIN }}.exe"
          mv "${{ env.BIN }}-${{ steps.ver.outputs.name }}-${{ matrix.target }}.zip" "$GITHUB_WORKSPACE"

      - name: Package | Raw binary
        shell: bash
        run: cp "target/${{ matrix.target }}/release/${{ env.BIN }}.exe" "${{ env.BIN }}-${{ steps.ver.outputs.name }}-${{ matrix.target }}.exe"

      - name: Upload | Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: |
            ${{ env.BIN }}-${{ steps.ver.outputs.name }}-${{ matrix.target }}.zip
            ${{ env.BIN }}-${{ steps.ver.outputs.name }}-${{ matrix.target }}.exe

  # Android is built with the NDK (zig/cross cannot build `ring` for Android).
  android:
    name: android (aarch64-linux-android)
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Setup | Version
        id: ver
        run: bash ci/version.bash

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build via the Android NDK
        run: docker buildx build -f docker/Dockerfile.android --output type=local,dest=bin .

      - name: Package | Compressed archive
        run: tar -czvf "${{ env.BIN }}-${{ steps.ver.outputs.name }}-aarch64-linux-android.tar.gz" --directory=bin ${{ env.BIN }}

      - name: Package | Raw binary
        run: cp "bin/${{ env.BIN }}" "${{ env.BIN }}-${{ steps.ver.outputs.name }}-aarch64-linux-android"

      - name: Upload | Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: |
            ${{ env.BIN }}-${{ steps.ver.outputs.name }}-aarch64-linux-android.tar.gz
            ${{ env.BIN }}-${{ steps.ver.outputs.name }}-aarch64-linux-android

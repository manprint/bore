name: Latest Binaries

on:
  push:
    branches: ['**']  # Any branch push

permissions:
  contents: write  # Needed to push to the binaries branch

jobs:
  # Download and setup cross-compilation tool for Linux targets
  install-cross:
    runs-on: ubuntu-latest
    outputs:
      cross-path: ${{ steps.cross.outputs.install_path }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50
      
      - uses: XAMPPRocky/get-github-release@v1
        id: cross
        with:
          owner: rust-embedded
          repo: cross
          matches: linux-musl
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/upload-artifact@v4
        with:
          name: cross-linux-musl
          path: ${{ steps.cross.outputs.install_path }}

  # Build macOS binaries
  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Build application
        run: |
          cargo build --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/bore ./bore-${{ matrix.target }}
      
      - name: Prepare binary filename
        id: prep
        run: |
          echo "binary_name=bore-${{ matrix.target }}" >> $GITHUB_OUTPUT
      
      - name: Verify binary exists
        run: ls -la ./bore-${{ matrix.target }}
      
      - name: Create binaries directory and copy binary
        run: |
          mkdir -p binaries
          cp ./bore-${{ matrix.target }} binaries/
      
      - name: Configure Git for deployment
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
      
      - name: Deploy to binaries branch
        run: |
          # Fetch the binaries branch (create if doesn't exist)
          git fetch origin binaries || git checkout --orphan binaries
          
          # Switch to binaries branch
          git checkout binaries
          
          # Remove any existing files (clean slate approach)
          git rm -rf . || true
          
          # Copy new binaries
          cp -r binaries/* .
          
          # Add and commit
          git add .
          git commit -m "Update binaries from ${{ github.sha }} (${{ github.ref_name }})" || echo "No changes to commit"
          
          # Force push to overwrite previous binaries
          git push origin binaries --force

  # Build Linux binaries using cross-compilation
  linux:
    runs-on: ubuntu-latest
    needs: install-cross
    strategy:
      matrix:
        target:
          - aarch64-unknown-linux-musl
          - arm-unknown-linux-musleabi
          - arm-unknown-linux-gnueabi
          - armv7-unknown-linux-gnueabihf
          - armv7-unknown-linux-musleabihf
          - i686-unknown-linux-musl
          - x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Cross
        uses: actions/download-artifact@v4
        with:
          name: cross-linux-musl
          path: /tmp/
      
      - name: Make cross executable
        run: chmod +x /tmp/cross
      
      - name: Set Rust version
        run: bash ci/set_rust_version.bash stable ${{ matrix.target }}
      
      - name: Build application
        run: |
          ci/build.bash /tmp/cross ${{ matrix.target }} RELEASE
          cp target/${{ matrix.target }}/release/bore ./bore-${{ matrix.target }}
      
      - name: Prepare binary filename
        id: prep
        run: |
          echo "binary_name=bore-${{ matrix.target }}" >> $GITHUB_OUTPUT
      
      - name: Verify binary exists
        run: ls -la ./bore-${{ matrix.target }}
      
      - name: Create binaries directory and copy binary
        run: |
          mkdir -p binaries
          cp ./bore-${{ matrix.target }} binaries/
      
      - name: Configure Git for deployment
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
      
      - name: Deploy to binaries branch
        run: |
          # Fetch the binaries branch (create if doesn't exist)
          git fetch origin binaries || git checkout --orphan binaries
          
          # Switch to binaries branch
          git checkout binaries
          
          # Remove any existing files (clean slate approach)
          git rm -rf . || true
          
          # Copy new binaries
          cp -r binaries/* .
          
          # Add and commit
          git add .
          git commit -m "Update binaries from ${{ github.sha }} (${{ github.ref_name }})" || echo "No changes to commit"
          
          # Force push to overwrite previous binaries
          git push origin binaries --force

  # Build Windows binaries
  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target:
          - i686-pc-windows-msvc
          - x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Set Rust version
        run: bash ci/set_rust_version.bash stable ${{ matrix.target }}
      
      - name: Build application
        run: |
          ci/build.bash cargo ${{ matrix.target }} RELEASE
          cp target/${{ matrix.target }}/release/bore.exe ./bore-${{ matrix.target }}.exe
      
      - name: Prepare binary filename
        id: prep
        run: |
          echo "binary_name=bore-${{ matrix.target }}.exe" >> $GITHUB_OUTPUT
      
      - name: Verify binary exists
        run: ls -la ./bore-${{ matrix.target }}.exe
      
      - name: Create binaries directory and copy binary
        run: |
          mkdir -p binaries
          cp ./bore-${{ matrix.target }}.exe binaries/
      
      - name: Configure Git for deployment
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
      
      - name: Deploy to binaries branch
        run: |
          # Fetch the binaries branch (create if doesn't exist)
          git fetch origin binaries || git checkout --orphan binaries
          
          # Switch to binaries branch
          git checkout binaries
          
          # Remove any existing files (clean slate approach)
          git rm -rf . || true
          
          # Copy new binaries
          cp -r binaries/* .
          
          # Add and commit
          git add .
          git commit -m "Update binaries from ${{ github.sha }} (${{ github.ref_name }})" || echo "No changes to commit"
          
          # Force push to overwrite previous binaries
          git push origin binaries --force

  # Build Android binaries
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build via Android NDK
        run: |
          docker buildx build -f docker/Dockerfile.android --output type=local,dest=bin .
          cp bin/bore ./bore-aarch64-linux-android
      
      - name: Prepare binary filename
        id: prep
        run: |
          echo "binary_name=bore-aarch64-linux-android" >> $GITHUB_OUTPUT
      
      - name: Verify binary exists
        run: ls -la ./bore-aarch64-linux-android
      
      - name: Create binaries directory and copy binary
        run: |
          mkdir -p binaries
          cp ./bore-aarch64-linux-android binaries/
      
      - name: Configure Git for deployment
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
      
      - name: Deploy to binaries branch
        run: |
          # Fetch the binaries branch (create if doesn't exist)
          git fetch origin binaries || git checkout --orphan binaries
          
          # Switch to binaries branch
          git checkout binaries
          
          # Remove any existing files (clean slate approach)
          git rm -rf . || true
          
          # Copy new binaries
          cp -r binaries/* .
          
          # Add and commit
          git add .
          git commit -m "Update binaries from ${{ github.sha }} (${{ github.ref_name }})" || echo "No changes to commit"
          
          # Force push to overwrite previous binaries
          git push origin binaries --force
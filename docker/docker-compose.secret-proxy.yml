# bore secret proxy (`bore proxy`) — host network.
#
#   docker compose -f docker-compose.secret-proxy.yml up -d
#
# Connects to a named secret tunnel and exposes it on a local port. Host
# networking binds that port directly on the host (reachable by other machines).

services:
  bore-secret-proxy:
    image: ${BORE_IMAGE:-yourusername/bore:latest}
    # build:
    #   context: ..
    #   dockerfile: Dockerfile
    container_name: bore-secret-proxy
    command: ["proxy"]
    restart: unless-stopped
    network_mode: host
    environment:
      - BORE_SERVER=bore.tld              # --to; may be http(s)://bore.tld[:port]
      - BORE_LOCAL_PROXY_PORT=:5555       # local listen address (":5555" = all interfaces)
      - BORE_TCP_SECRET_ID=my-service     # must match the provider's tcp-secret-id
      - BORE_SECRET=change-me
      - BORE_AUTO_RECONNECT=true
      # Accept a self-signed server certificate for an https:// control address:
      # - BORE_INSECURE=true

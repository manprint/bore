name: Continuous Raw Builds

on:
  push:
    branches:
      - "**" # every branch
    tags:
      - "v*" # version tags, e.g. v1.0.0

# Only one run of this workflow active at a time — a newer push cancels an
# in-flight run, so the `continuous` release always reflects the latest push.
concurrency:
  group: continuous-builds
  cancel-in-progress: true

permissions:
  contents: write

env:
  BIN: bore

jobs:
  # Shared version info for release notes.
  version:
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.ver.outputs.name }}
    steps:
      - uses: actions/checkout@v4
      - id: ver
        run: bash ci/version.bash

  # Wipe the previous `continuous` release + tag, then create a fresh one.
  # Build jobs upload raw binary assets to it.
  continuous-release:
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4
      - name: Delete previous continuous release
        continue-on-error: true
        run: gh release delete continuous --yes --cleanup-tag 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create fresh continuous release
        run: |
          gh release create continuous \
            --title "bore continuous build (${{ github.ref_name }})" \
            --notes "Latest build from \`${{ github.ref_name }}\` @ \`${{ github.sha }}\`
                     Version: \`${{ needs.version.outputs.name }}\`"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Build matrix — every target the deploy workflow builds, minus compression.
  # ---------------------------------------------------------------------------

  # Download and store `cross` as an artifact for Linux cross-compilation.
  install-cross:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50
      - uses: XAMPPRocky/get-github-release@v1
        id: cross
        with:
          owner: rust-embedded
          repo: cross
          matches: linux-musl
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: cross-linux-musl
          path: ${{ steps.cross.outputs.install_path }}

  macos:
    runs-on: macos-latest
    needs: [continuous-release, version]
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-continuous-${{ hashFiles('**/Cargo.lock') }}-${{ matrix.target }}
      - run: cargo build --all-features --release --target ${{ matrix.target }}
      - name: Upload raw binary
        run: |
          gh release upload continuous \
            "target/${{ matrix.target }}/release/${{ env.BIN }}"#"${{ env.BIN }}-${{ matrix.target }}" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  linux:
    runs-on: ubuntu-latest
    needs: [continuous-release, version, install-cross]
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-musl
          - arm-unknown-linux-musleabi
          - arm-unknown-linux-gnueabi
          - armv7-unknown-linux-gnueabihf
          - armv7-unknown-linux-musleabihf
          - i686-unknown-linux-musl
          - x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cross-linux-musl
          path: /tmp/
      - run: chmod +x /tmp/cross
      - run: ci/set_rust_version.bash stable ${{ matrix.target }}
      - run: ci/build.bash /tmp/cross ${{ matrix.target }} RELEASE
      - name: Upload raw binary
        run: |
          gh release upload continuous \
            "target/${{ matrix.target }}/release/${{ env.BIN }}"#"${{ env.BIN }}-${{ matrix.target }}" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows:
    runs-on: windows-latest
    needs: [continuous-release, version, install-cross]
    strategy:
      fail-fast: false
      matrix:
        target:
          - i686-pc-windows-msvc
          - x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - run: ci/set_rust_version.bash stable ${{ matrix.target }}
        shell: bash
      - run: ci/build.bash cargo ${{ matrix.target }} RELEASE
        shell: bash
      - name: Upload raw binary
        shell: bash
        run: |
          gh release upload continuous \
            "target/${{ matrix.target }}/release/${{ env.BIN }}.exe"#"${{ env.BIN }}-${{ matrix.target }}.exe" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Android is built with the NDK (zig/cross cannot build `ring` for Android).
  android:
    runs-on: ubuntu-latest
    needs: [continuous-release, version]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build via Android NDK
        run: |
          docker buildx build -f docker/Dockerfile.android \
            --output type=local,dest=${{ runner.temp }}/android-out .
      - name: Upload raw binary
        run: |
          gh release upload continuous \
            "${{ runner.temp }}/android-out/${{ env.BIN }}"#"${{ env.BIN }}-aarch64-linux-android" \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# bore server — bridge network with explicit port forwarding.
#
#   docker compose -f docker-compose.server.yml up -d
#
# The image defaults to $BORE_IMAGE (see the justfile `repo`); override with
#   BORE_IMAGE=youruser/bore:latest docker compose ... up -d
#
# Performance / UDP notes: see ../SERVER_UDP_OPTIMIZATION.md.

networks:
  bore:
    driver: bridge

services:
  bore-server:
    image: ${BORE_IMAGE:-yourusername/bore:latest}
    # To build locally instead of pulling, comment `image:` and uncomment:
    # build:
    #   context: ..
    #   dockerfile: Dockerfile
    container_name: bore-server
    command: ["server"]
    restart: unless-stopped

    # Default: Docker bridge network. This keeps Docker isolation and requires
    # explicit `ports:` below. For public STUN/UDP deployments, bridge NAT can
    # sometimes hide details of the client's real UDP source address. If paired
    # `bore test-udp` always falls back to relay despite reachable UDP, try host
    # networking on Linux.
    #
    # Host networking alternative:
    #   1. Uncomment `network_mode: host`.
    #   2. Comment out `networks:` and the whole `ports:` block below.
    #   3. Open BORE_CONTROL_PORT/tcp, BORE_CONTROL_PORT/udp, and the tunnel
    #      range on the host firewall / cloud security group.
    #
    # Trade-off: host networking is usually best for STUN correctness and lowest
    # overhead, but it shares the host network namespace and gives less Docker
    # isolation. It is primarily a Linux production option.
    # network_mode: host
    networks:
      - bore

    # Raise this when BORE_MAX_CONNS / BORE_MAX_CARRIERS are increased. Each
    # relayed connection and carrier consumes file descriptors; too low a limit
    # causes accept/connect failures under load. The host/Docker daemon must also
    # allow the requested value.
    # ulimits:
    #   nofile:
    #     soft: 1048576
    #     hard: 1048576

    # The control port and the tunnel port range must be forwarded explicitly,
    # and MUST match BORE_CONTROL_PORT and BORE_MIN_PORT/BORE_MAX_PORT below.
    ports:
      - "7835:7835"            # control port (TCP)
      - "7835:7835/udp"        # STUN responder fallback (UDP) for BORE_UDP direct paths
      - "6000-7000:6000-7000"  # tunnel port range
      # Optionally expose the control port on a standard web port. The scheme is
      # decided by the certificate, not the port:
      # - "80:7835"            # plain HTTP (no cert/key set) -> clients use http://bore.tld
      # - "443:7835"           # HTTPS (set BORE_CERT_FILE/BORE_KEY_FILE) -> clients use https://bore.tld
    environment:
      - BORE_SECRET=change-me
      - BORE_CONTROL_PORT=7835
      - BORE_MIN_PORT=6000
      - BORE_MAX_PORT=7000
      # Max concurrently proxied connections through the server relay/public
      # data path. Raising it allows more load, but requires CPU, RAM and enough
      # file descriptors (`ulimits.nofile`). It does NOT increase direct UDP
      # bandwidth: successful UDP direct data bypasses the server.
      - BORE_MAX_CONNS=1024
      # Cap on parallel TCP "carrier" connections for public tunnels and secret
      # providers using --carriers. Helps concurrent relay workloads, not single
      # bulk flows, and has no effect on the UDP direct data path. Higher values
      # mean more sockets and scheduler work; 1 disables server-side pools.
      - BORE_MAX_CARRIERS=16
      # Direct-UDP tuning defaults (match src/shared.rs; override here if you
      # want to change the brokered QUIC and socket profile on the server).
      - BORE_UDP_STREAM_RECEIVE_WINDOW=16MiB
      - BORE_UDP_CONNECTION_RECEIVE_WINDOW=64MiB
      - BORE_UDP_SEND_WINDOW=64MiB
      - BORE_UDP_SOCKET_RECV_BUFFER=16MiB
      - BORE_UDP_SOCKET_SEND_BUFFER=16MiB
      - BORE_UDP_MAX_STREAMS=4096
      # Broker UDP hole-punched direct paths for secret tunnels and run a STUN
      # responder on the control port (UDP). Clients try public STUN first
      # (Cloudflare/Google) and use this 7835/udp responder as the self-hosted
      # fallback. The direct data path is peer-to-peer and does NOT traverse this
      # container; only STUN/brokering + control do.
      - BORE_UDP=true
      # NAT caveat: behind docker's bridge, the STUN responder must see each
      # client's real source address. If reflexive discovery misbehaves (clients
      # always fall back to relay), run the server with `network_mode: host`
      # instead of bridge, or point clients at an external --stun-server.
      # Public domain advertised to clients (enables http(s):// addressing):
      # - BORE_BIND_DOMAIN=bore.tld
      # Enable the read-only admin status page at /admin/status on the control
      # port (min 32 chars). It is served over the same scheme as the control
      # connection (http or https). Leave unset to disable the page entirely.
      # - BORE_ADMIN_TOKEN=change-me-to-a-long-random-token-32+chars
      # Serve the control connection over TLS (also used for --https tunnels);
      # mount the files via the `volumes:` block below.
      # - BORE_CERT_FILE=/certs/cert.pem
      # - BORE_KEY_FILE=/certs/key.pem
    # volumes:
    #   - ./certs:/certs:ro

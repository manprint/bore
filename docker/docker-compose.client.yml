# bore client (`bore local`) — host network.
#
#   docker compose -f docker-compose.client.yml up -d
#
# Host networking lets the client reach services on the host's localhost and
# avoids per-port forwarding.

services:
  bore-client:
    image: ${BORE_IMAGE:-yourusername/bore:latest}
    # build:
    #   context: ..
    #   dockerfile: Dockerfile
    container_name: bore-client
    command: ["local"]
    # --port and --local-host have no env vars; set them in the command instead:
    # command: ["local", "--port", "9000", "--local-host", "127.0.0.1"]
    #
    # Expose the local service as a Host-routed subdomain instead (the server must
    # run with a vhost frontend; see docker-compose.server.yml + ../docs/VHOST.md).
    # The target is a positional arg; --subdomain/--id also read BORE_VHOST_SUBDOMAIN
    # / BORE_VHOST_ID. Reachable at http(s)://<subdomain>.<server-base-domain>:
    # command: ["vhost", "127.0.0.1:8080", "--subdomain", "app", "--id", "my-client"]
    restart: unless-stopped
    network_mode: host
    environment:
      - BORE_SERVER=bore.tld          # --to; may be http(s)://bore.tld[:port]
      - BORE_LOCAL_PORT=8080          # local service port to expose
      - BORE_SECRET=change-me
      - BORE_AUTO_RECONNECT=true
      # Register as a named secret tunnel (no public port; reach via bore proxy):
      # - BORE_TCP_SECRET_ID=my-service
      # Prefer a direct UDP hole-punched path to the consumer. Takes effect only
      # together with BORE_TCP_SECRET_ID (secret-tunnel provider); ignored for a
      # public-port tunnel. Falls back to the relay if it can't be established.
      # Requires the server to run with BORE_UDP=true.
      - BORE_PREFER_UDP=true
      # STUN server for UDP candidate discovery; defaults to the bore server's
      # control endpoint. Override only if the server is not also the STUN server:
      # - BORE_STUN_SERVER=stun.l.google.com:19302
      # Bind the UDP hole-punch socket to a fixed port (0=random). Open it for
      # egress in a strict firewall, same value on both peers, for the direct path:
      # - BORE_NAT_UDP_PORT=41641
      # Terminate TLS on the tunnel port (the server must have a certificate):
      # - BORE_HTTPS=true
      # Redirect plain HTTP on the tunnel port to https:// (requires BORE_HTTPS):
      # - BORE_FORCE_HTTPS=true
      # Protect the tunnel with HTTP Basic auth ("user:pass"). For a public tunnel
      # the server enforces it; for a secret tunnel this provider enforces it. Use
      # over TLS so credentials are not sent in the clear.
      # - BORE_BASIC_AUTH=admin:s3cr3t
      # Label this tunnel on the server's admin status page:
      # - BORE_NOTES=dev box A
      # Open N parallel TCP carrier connections for the relay data path and spread
      # proxied connections across them (round-robin), avoiding yamux's single-
      # connection head-of-line blocking under concurrency (e.g. parallel rclone/S3
      # transfers, many web requests). Works for a public tunnel (server->client leg)
      # and a secret provider (server->provider leg). 1 = single connection. The
      # server clamps this to its BORE_MAX_CARRIERS. (The UDP direct path already
      # uses independent native QUIC streams, so it needs no carriers.)
      # - BORE_CARRIERS=4
      # Accept a self-signed server certificate for an https:// control address:
      # - BORE_INSECURE=true
